version: '3.8'

services:
  barbersync:
    build: .
    container_name: barbersync
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run start:dev
    networks:
      - barbersync-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - barbersync-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@barbersync.com
      PGADMIN_DEFAULT_PASSWORD: barbersync
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - barbersync-network

volumes:
  postgres-data:

networks:
  barbersync-network:
    driver: bridge
